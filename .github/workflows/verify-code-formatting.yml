name: javascript / format

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: 'Verify formatting of all files'
        run: ./bin/check-formatting.sh
